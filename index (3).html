<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Móvil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f4f4f9; }
        .container { background: white; padding: 15px; border-radius: 10px; }
        #reader { width: 100%; max-width: 400px; margin: auto; } /* Ventana de la cámara */
        .dif-negativa { color: red; font-weight: bold; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .controles { margin-bottom: 20px; border: 2px solid #007bff; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3>📱 Escáner de Inventario</h3>
    
    <input type="file" id="archivoCsv" accept=".csv" style="margin-bottom: 10px;">
    
    <div class="controles">
        <div id="reader"></div> <p id="resultado-lectura" style="text-align: center; font-weight: bold;"></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Prod</th>
                <th>Sis</th>
                <th>Fís</th>
                <th>Dif</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    let productos = [];

    // 1. Cargar CSV
    document.getElementById('archivoCsv').addEventListener('change', function(e) {
        Papa.parse(e.target.files[0], {
            header: true,
            complete: function(r) {
                productos = r.data.map(p => ({ ...p, fisico: 0 }));
                actualizarTabla();
            }
        });
    });

    // 2. Iniciar Cámara
    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 150 } };

    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        // Al detectar un código:
        document.getElementById('resultado-lectura').innerText = "Leído: " + decodedText;
        procesarEscaneo(decodedText);
    });

    function procesarEscaneo(codigo) {
        const p = productos.find(item => Object.values(item).includes(codigo));
        if (p) {
            p.fisico++;
            actualizarTabla();
        }
    }

    function actualizarTabla() {
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = productos.map(p => {
            const stock = parseInt(p.Stock || 0);
            const dif = p.fisico - stock;
            return `<tr>
                <td>${p.Nombre || '---'}</td>
                <td>${stock}</td>
                <td>${p.fisico}</td>
                <td class="${dif < 0 ? 'dif-negativa' : ''}">${dif}</td>
            </tr>`;
        }).join('');
    }
</script>
</body>
</html>
